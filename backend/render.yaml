services:
  - type: web
    name: devradar-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HYDRADB_API_KEY
        sync: false
      - key: HYDRADB_PROJECT_ID
        sync: false
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
